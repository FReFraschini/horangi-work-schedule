services:
  app:
    build:
      context: .
      dockerfile: .docker/php/Dockerfile
    container_name: horangi-work-schedule-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./code:/var/www
    networks:
      - sail

  nginx:
    image: nginx:alpine
    container_name: horangi-work-schedule-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8000}:80"
    volumes:
      - ./code:/var/www
      - ./.docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - sail

  db:
    image: mysql:8.0
    container_name: horangi-work-schedule-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-horangi}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-horangi}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - ./.data/mysql:/var/lib/mysql
    networks:
      - sail
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-p${DB_PASSWORD:-password}"]
      retries: 3
      timeout: 5s

networks:
  sail:
    driver: bridge